site_name: Range WebAR Exporter
site_description: Blender addon to export Range Engine scenes to WebAR with Three.js and WebXR
site_author: Salvador Mata (Mataii)
site_url: https://mataiie.github.io/range-webar-docs/

repo_name: range-webar-exporter
repo_url: https://github.com/your-username/range-webar-exporter

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - First AR Scene: getting-started/first-scene.md
  - Main Panel:
    - Overview: panels/main-panel.md
    - Export Settings: panels/export-settings.md
    - AR Modes: panels/ar-modes.md
    - Animation Modes: panels/animation-modes.md
    - UI Overlay: panels/ui-overlay.md
    - Interactions: panels/interactions.md
  - Object Panel:
    - Per-Object Settings: panels/object-panel.md
    - Materials (Classic): materials/classic.md
    - Materials (PBR): materials/pbr.md
    - Hotspots: panels/hotspots.md
  - Node Tree:
    - Introduction: nodes/introduction.md
    - Object Nodes: nodes/object-nodes.md
    - Animation Nodes: nodes/animation-nodes.md
    - Event Nodes: nodes/event-nodes.md
  - Reference:
    - scene.json Schema: reference/scene-schema.md
    - Output Files: reference/output-files.md
    - Troubleshooting: reference/troubleshooting.md
    - FAQ: reference/faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username
    - icon: fontawesome/solid/globe
      link: https://salvador.mata.com.mx

copyright: Copyright &copy; 2026 Salvador Mata (Mataii) — Licensed under GPL v3
